default_runtime_authority: user
repo_runtime_override: optional

lanes:
  coordinator:
    runtime: copilot
    default_model: gpt-5.4
    fallbacks:
      - claude-sonnet-4.6
      - claude-opus-4.7
    free_models_allowed: false
    escalation_cap: claude-opus-4.7

  scout:
    runtime: openrouter
    default_model: qwen/qwen3-coder:free
    code_fallbacks:
      - nvidia/nemotron-3-super-120b-a12b:free
      - openai/gpt-oss-120b:free
    synthesis_fallbacks:
      - z-ai/glm-4.5-air:free
      - google/gemma-4-31b-it:free
    free_models_allowed: true
    escalation_cap: nvidia/nemotron-3-super-120b-a12b:free

  implementer:
    runtime: copilot
    default_model: gpt-5.3-codex
    fallbacks:
      - openai/gpt-5.1-codex-mini
      - openai/gpt-5-codex
    free_models_allowed: false
    escalation_cap: openai/gpt-5-codex

  validator:
    runtime: copilot
    default_model: gpt-4.1
    fallbacks:
      - claude-haiku-4.5
      - gpt-5.4
    free_models_allowed: false
    escalation_cap: gpt-5.4

  reviewer:
    runtime: copilot
    default_model: claude-sonnet-4.6
    fallbacks:
      - gpt-5.4
      - claude-opus-4.7
    free_models_allowed: false
    escalation_cap: claude-opus-4.7

  documentation:
    runtime: mixed
    default_model: google/gemma-4-31b-it:free
    fallbacks:
      - z-ai/glm-4.5-air:free
      - openrouter/free
    free_models_allowed: true
    escalation_cap: openai/gpt-oss-120b:free

escalation_rules:
  retry_limit_before_escalation: 2
  require_coordinator_approval_for:
    - scout_above_economy
    - implementer_above_balanced
    - any_premium_openrouter_model
  immediate_hard_escalation_for:
    - security_review
    - legal_or_license_risk
    - release_blocker
    - architecture_change
