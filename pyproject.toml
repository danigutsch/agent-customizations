[tool.ruff]
target-version = "py311"
line-length = 100
src = ["scripts"]
extend-exclude = ["tmp", "temp"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "UP", "B"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = true

[tool.pyright]
include = ["scripts"]
exclude = ["**/__pycache__", "**/node_modules", "**/.*", "tmp", "temp"]
typeCheckingMode = "standard"
pythonVersion = "3.11"
