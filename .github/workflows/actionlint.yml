name: Actionlint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  workflow_dispatch:

concurrency:
  group: actionlint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    env:
      ACTIONLINT_VERSION: "1.7.9"

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Install actionlint
        shell: bash
        run: |
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          checksums="actionlint_${ACTIONLINT_VERSION}_checksums.txt"
          base_url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"

          curl_args=(
            --fail
            --silent
            --show-error
            --location
            --proto '=https'
            --proto-redir '=https'
            --tlsv1.2
          )

          curl "${curl_args[@]}" --output "$archive" "$base_url/$archive"
          curl "${curl_args[@]}" --output "$checksums" "$base_url/$checksums"
          grep "  $archive$" "$checksums" | sha256sum --check --status
          tar -xzf "$archive" actionlint
          sudo install actionlint /usr/local/bin/actionlint

      - name: Lint GitHub Actions workflows
        run: actionlint -color
